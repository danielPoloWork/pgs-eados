name: release-bundle

# Attach the consumer factory bundle to every published GitHub release, so users can grab the
# stripped factory without cloning. The human publishes the release (tag + release notes); this
# workflow only builds the artifacts and uploads them — it never creates or publishes a release.
#
# The bundle is `git archive` of the released commit, honoring the `export-ignore` rules in
# .gitattributes (the factory + agent contract + LICENSE; none of this repo's own plumbing).
# See .eados-core/docs/USAGE.md "Distribution bundle".

on:
  release:
    types: [published]

permissions:
  contents: write          # upload assets onto the release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  bundle:
    name: build & attach factory bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the factory bundle (prefix-less; export-ignore strips repo-management files)
        run: |
          # No --prefix: the archive's contents sit at the top level, so extracting it at the
          # root of a user's project repo lands .eados-core/ there directly (not in a subfolder).
          git archive --format=tar.gz -o pgs-eados-bundle.tar.gz HEAD
          git archive --format=zip    -o pgs-eados-bundle.zip    HEAD
      - name: Sanity-check the archive contents
        run: |
          set -e
          listing="$(tar tzf pgs-eados-bundle.tar.gz)"
          echo "$listing" | grep -q '^\.eados-core/tools/render.py$' || { echo "bundle missing the factory"; exit 1; }
          echo "$listing" | grep -Eq '^(README|SECURITY|CONTRIBUTING|CHANGELOG)\.md$' && { echo "bundle leaked a stripped file"; exit 1; } || true
      - name: Attach to the release (version-less names → stable /latest/download link)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" pgs-eados-bundle.tar.gz pgs-eados-bundle.zip --clobber
