name: release-bundle

# Attach the consumer factory bundle to every published GitHub release, so users can grab the
# stripped factory without cloning. The human publishes the release (tag + release notes); this
# workflow only builds the artifacts and uploads them — it never creates or publishes a release.
#
# The bundle is `git archive` of the released commit, honoring the `export-ignore` rules in
# .gitattributes (the factory + agent contract + LICENSE; none of this repo's own plumbing).
# See .eados-core/docs/USAGE.md "Distribution bundle".
#
# It also attaches (M9 9.4): a `SHA256SUMS` over every asset — the guided installer's default
# checksum source (install.sh / install.ps1 verify the bundle against it, fail-closed) — and the
# guided installer scripts themselves (export-ignored from the bundle, since they *download* it), so
# `releases/latest/download/install.{sh,ps1}` (and setup.sh / install.command / install.bat) are
# stable links.

on:
  release:
    types: [published]

permissions:
  contents: write          # upload assets onto the release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  bundle:
    name: build & attach bundle + installers + SHA256SUMS
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the factory bundle (prefix-less; export-ignore strips repo-management files)
        run: |
          # No --prefix: the archive's contents sit at the top level, so extracting it at the
          # root of a user's project repo lands .eados-core/ there directly (not in a subfolder).
          git archive --format=tar.gz -o pgs-eados-bundle.tar.gz HEAD
          git archive --format=zip    -o pgs-eados-bundle.zip    HEAD
      - name: Sanity-check the archive contents
        run: |
          set -e
          listing="$(tar tzf pgs-eados-bundle.tar.gz)"
          echo "$listing" | grep -q '^\.eados-core/tools/render.py$' || { echo "bundle missing the factory"; exit 1; }
          echo "$listing" | grep -Eq '^(README|SECURITY|CONTRIBUTING|CHANGELOG)\.md$' && { echo "bundle leaked a stripped file"; exit 1; } || true
      - name: Stage the installers and compute SHA256SUMS
        run: |
          set -e
          # The guided installers are export-ignored from the bundle (they download it), so they ship
          # as standalone assets. Copy them to the root so both the asset names and the SHA256SUMS
          # entries are basenames (install.sh / install.ps1 parse SHA256SUMS by basename).
          cp install/install.sh install/setup.sh install/install.command \
             install/install.ps1 install/install.bat .
          # SHA256SUMS over every attached file — sha256sum's text format ("<hex>  <name>") is exactly
          # what the installers parse. The bundle line is the installer's default integrity source.
          sha256sum pgs-eados-bundle.tar.gz pgs-eados-bundle.zip \
                    install.sh setup.sh install.command install.ps1 install.bat > SHA256SUMS
          echo "----- SHA256SUMS -----"; cat SHA256SUMS
      - name: Attach to the release (version-less names → stable /latest/download links)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            pgs-eados-bundle.tar.gz pgs-eados-bundle.zip SHA256SUMS \
            install.sh setup.sh install.command install.ps1 install.bat --clobber
