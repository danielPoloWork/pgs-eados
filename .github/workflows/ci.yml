name: eados-ci

# CI for the EADOS factory itself. The orchestrator is held to the bar it imposes downstream:
# the self-lint asserts placeholder integrity, profile completeness, and that every template
# the generation playbook names exists on disk.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on main (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  self-lint:
    name: self-lint / factory integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: EADOS self-lint
        run: python .eados-core/tools/eados_lint.py
      # #168: the suite is DISCOVERED (tools/tests/test_*.py), never enumerated — a new test
      # runs here with no ci.yml edit. The render-smoke job re-runs a few of these in their
      # special contexts (PyYAML installed, a rendered repo); duplication there is harmless.
      - name: Factory test suite (discovery runner — every tools/tests/test_*.py)
        run: python .eados-core/tools/tests/run_all.py
      - name: Byte-compile the factory tooling (recursive - nothing enumerated; #168)
        run: python -m compileall -q .eados-core/tools
      - name: Installer static analysis (shellcheck for *.sh / *.command; PowerShell parse for *.ps1)
        run: |
          shellcheck -s sh setup/*.sh setup/*.command
          pwsh -NoProfile -Command 'Get-ChildItem setup -Filter *.ps1 | ForEach-Object { $e=$null; [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName,[ref]$null,[ref]$e); if($e){ Write-Error ("parse errors in "+$_.Name); $e | ForEach-Object { Write-Error $_.Message }; exit 1 } }; Write-Host "ps1 parse: clean"'
      - name: Auto-tuner (advisory)
        run: python .eados-core/tools/autotune.py
      - name: Lesson audit (advisory — regressions / dead lessons / rubric trends; #173)
        run: python .eados-core/tools/lesson_audit.py

  render-smoke:
    name: render / reference manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install PyYAML (pinned + hashed; real-parser gate for emitted CI YAML)
        run: pip install --require-hashes -r .eados-core/tools/requirements-ci.txt
      - name: Loader fidelity (hand-rolled vs PyYAML differential)
        run: python .eados-core/tools/tests/test_loader.py
      - name: Questionnaire full-parse + PyYAML differential (PyYAML present here; #153)
        run: python .eados-core/tools/tests/test_spec_provenance.py
      - name: Render the reference manifest and run the generated lint
        run: |
          python .eados-core/tools/render.py .eados-core/orchestrator/examples/reference.yaml --out /tmp/rendered
          python /tmp/rendered/tools/consistency_lint.py
          python .eados-core/tools/self_review.py /tmp/rendered
      - name: Generated consistency-lint negative-path tests (defects must fail the lint)
        run: python .eados-core/tools/tests/test_consistency_lint.py
      - name: Architecture-style / pattern elicitation renders into the catalogue (#151)
        run: python .eados-core/tools/tests/test_architecture_style.py
      - name: Validate every profile's CI fragments and the rendered YAML actually parse
        run: python .eados-core/tools/profile_ci_lint.py --rendered /tmp/rendered
