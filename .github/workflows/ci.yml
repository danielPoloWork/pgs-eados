name: eados-ci

# CI for the EADOS factory itself. The orchestrator is held to the bar it imposes downstream:
# the self-lint asserts placeholder integrity, profile completeness, and that every template
# the generation playbook names exists on disk.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on main (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  self-lint:
    name: self-lint / factory integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: EADOS self-lint
        run: python .eados-core/tools/eados_lint.py
      - name: Renderer guard tests (validation, containment, CLI — dependency-free)
        run: python .eados-core/tools/tests/test_render_guards.py
      - name: OS tooling unit tests (engine, autotune, phase-runner, rfc/authority/traceability)
        run: |
          python .eados-core/tools/tests/test_render_engine.py
          python .eados-core/tools/tests/test_autotune.py
          python .eados-core/tools/tests/test_phase_runner.py
          python .eados-core/tools/tests/test_rfc_check.py
          python .eados-core/tools/tests/test_authority_check.py
          python .eados-core/tools/tests/test_traceability.py
          python .eados-core/tools/tests/test_risk_score.py
          python .eados-core/tools/tests/test_brownfield.py
          python .eados-core/tools/tests/test_migration_planner.py
          python .eados-core/tools/tests/test_sandbox.py
          python .eados-core/tools/tests/test_cross_spec.py
          python .eados-core/tools/tests/test_sync_action_pins.py
          python .eados-core/tools/tests/test_render_artifact.py
          python .eados-core/tools/tests/test_doctor.py
          python .eados-core/tools/tests/test_eados.py
          python .eados-core/tools/tests/test_derive_links.py
      - name: End-to-end phase-flow smoke (design -> plan -> audit over a fixture; G4)
        run: python .eados-core/tools/tests/test_phase_smoke.py
      - name: Byte-compile the factory tooling
        run: python -m py_compile .eados-core/tools/eados_lint.py .eados-core/tools/render.py .eados-core/tools/autotune.py .eados-core/tools/self_review.py .eados-core/tools/profile_ci_lint.py .eados-core/tools/phase_runner.py .eados-core/tools/rfc_check.py .eados-core/tools/authority_check.py .eados-core/tools/traceability.py .eados-core/tools/risk_score.py .eados-core/tools/brownfield.py .eados-core/tools/migration_planner.py .eados-core/tools/sandbox.py .eados-core/tools/tests/test_loader.py .eados-core/tools/tests/test_render_guards.py .eados-core/tools/tests/test_render_engine.py .eados-core/tools/tests/test_consistency_lint.py .eados-core/tools/tests/test_autotune.py .eados-core/tools/tests/test_phase_runner.py .eados-core/tools/tests/test_rfc_check.py .eados-core/tools/tests/test_authority_check.py .eados-core/tools/tests/test_traceability.py .eados-core/tools/tests/test_risk_score.py .eados-core/tools/tests/test_brownfield.py .eados-core/tools/tests/test_migration_planner.py .eados-core/tools/tests/test_sandbox.py .eados-core/tools/tests/test_cross_spec.py .eados-core/tools/tests/test_phase_smoke.py .eados-core/tools/sync_action_pins.py .eados-core/tools/tests/test_sync_action_pins.py .eados-core/tools/render_artifact.py .eados-core/tools/tests/test_render_artifact.py .eados-core/tools/doctor.py .eados-core/tools/tests/test_doctor.py .eados-core/tools/eados.py .eados-core/tools/tests/test_eados.py .eados-core/tools/derive_links.py .eados-core/tools/tests/test_derive_links.py
      - name: Auto-tuner (advisory)
        run: python .eados-core/tools/autotune.py

  render-smoke:
    name: render / reference manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install PyYAML (pinned + hashed; real-parser gate for emitted CI YAML)
        run: pip install --require-hashes -r .eados-core/tools/requirements-ci.txt
      - name: Loader fidelity (hand-rolled vs PyYAML differential)
        run: python .eados-core/tools/tests/test_loader.py
      - name: Render the reference manifest and run the generated lint
        run: |
          python .eados-core/tools/render.py .eados-core/orchestrator/examples/reference.yaml --out /tmp/rendered
          python /tmp/rendered/tools/consistency_lint.py
          python .eados-core/tools/self_review.py /tmp/rendered
      - name: Generated consistency-lint negative-path tests (defects must fail the lint)
        run: python .eados-core/tools/tests/test_consistency_lint.py
      - name: Validate every profile's CI fragments and the rendered YAML actually parse
        run: python .eados-core/tools/profile_ci_lint.py --rendered /tmp/rendered
