name: eaao-ci

# CI for the EAAO factory itself. The orchestrator is held to the bar it imposes downstream:
# the self-lint asserts placeholder integrity, profile completeness, and that every template
# the generation playbook names exists on disk.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on main (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  self-lint:
    name: self-lint / factory integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: EAAO self-lint
        run: python .eaao-core/tools/eaao_lint.py
      - name: Byte-compile the factory tooling
        run: python -m py_compile .eaao-core/tools/eaao_lint.py .eaao-core/tools/render.py .eaao-core/tools/autotune.py .eaao-core/tools/self_review.py .eaao-core/tools/profile_ci_lint.py .eaao-core/tools/tests/test_loader.py
      - name: Auto-tuner (advisory)
        run: python .eaao-core/tools/autotune.py

  render-smoke:
    name: render / reference manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install PyYAML (pinned + hashed; real-parser gate for emitted CI YAML)
        run: pip install --require-hashes -r .eaao-core/tools/requirements-ci.txt
      - name: Loader fidelity (hand-rolled vs PyYAML differential)
        run: python .eaao-core/tools/tests/test_loader.py
      - name: Render the reference manifest and run the generated lint
        run: |
          python .eaao-core/tools/render.py .eaao-core/orchestrator/examples/reference.yaml --out /tmp/rendered
          python /tmp/rendered/tools/consistency_lint.py
          python .eaao-core/tools/self_review.py /tmp/rendered
      - name: Validate every profile's CI fragments and the rendered YAML actually parse
        run: python .eaao-core/tools/profile_ci_lint.py --rendered /tmp/rendered
