# cpp.yaml — C/C++ toolchain profile (the ground-truth profile)
#
# Reverse-engineered verbatim from pbr-cpp-memory-pool: ADR-0005 (toolchain matrix),
# ADR-0006 (style + static analysis), .clang-format, .clang-tidy, CMakePresets.json,
# and .github/workflows/ci.yml. New language profiles should match this one's rigor.

lang:             cpp
display_name:     "C++"
default_standard: "C++17"
src_ext:          cpp

namespace_pattern: "{group_dotted_as_cpp}::{project_slug}"   # it.d4np -> it::d4np::memorypool
import_idiom:      "#include <{group_path}/{project_slug}/{project_slug}.h>"

toolchain:
  build_tool:      "CMake (>=3.20) + Ninja, CMakePresets.json"
  pkg_manager:     "vcpkg / Conan (test/bench deps only; library stays zero-dependency)"
  test_framework:  "doctest (FetchContent, test scope only)"
  formatter:       "clang-format (LLVM-derived, 4-space, 120 col)"
  linter:          "clang-tidy (bugprone/cert/cppcoreguidelines/modernize/performance/portability/readability)"
  sanitizers:      "ASan, UBSan, TSan, Valgrind"
  coverage_tool:   "llvm-cov / gcovr"
  doc_tool:        "Doxygen"
  version_file:    "version.hpp"          # under src_main
  version_const_hint: "PBR_<SLUG>_VERSION_{MAJOR,MINOR,PATCH,STRING}"
  package_ecosystem: ""                    # Dependabot has no vcpkg/Conan ecosystem; github-actions is still covered

commands:
  build:        "cmake --build --preset debug"
  test:         "ctest --preset debug --output-on-failure"
  format_check: "clang-format --dry-run --Werror <files>"
  lint:         "clang-tidy -p build/debug --warnings-as-errors='*' <changed .cpp/.hpp/.h>"
  bench:        "cmake --build --preset bench"

config_files:
  - .clang-format
  - .clang-tidy
  - CMakeLists.txt
  - CMakePresets.json

ci:
  tier1_platforms: "Linux x86_64 (GCC>=11, Clang>=14), Windows x86_64 (MSVC>=19.30), macOS arm64 (Apple Clang>=14)"
  matrix:
    - { os: ubuntu-24.04, toolchain: gcc,         preset: debug }
    - { os: ubuntu-24.04, toolchain: gcc,         preset: release }
    - { os: ubuntu-24.04, toolchain: gcc,         preset: asan }
    - { os: ubuntu-24.04, toolchain: gcc,         preset: ubsan }
    - { os: ubuntu-24.04, toolchain: clang,       preset: debug }
    - { os: ubuntu-24.04, toolchain: clang,       preset: release }
    - { os: windows-2022, toolchain: msvc,        preset: debug }
    - { os: windows-2022, toolchain: msvc,        preset: release }
    - { os: macos-14,     toolchain: apple-clang, preset: debug }
    - { os: macos-14,     toolchain: apple-clang, preset: release }
  setup_steps: |
    - name: Install a recent CMake and Ninja
      uses: lukka/get-cmake@latest
    - name: Set up MSVC environment
      if: matrix.toolchain == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
  extra_jobs: |
    format:
      name: format / clang-format check
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - name: Verify all C/C++ sources are clean
          shell: bash
          run: |
            mapfile -t files < <(git ls-files '*.cpp' '*.hpp' '*.h' '*.c')
            [[ ${#files[@]} -eq 0 ]] && exit 0
            clang-format --dry-run --Werror "${files[@]}"
    tidy:
      name: tidy / clang-tidy diff gate
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
          with: { fetch-depth: 0 }
        - uses: lukka/get-cmake@latest
        - name: Configure debug to produce compile_commands.json
          run: { CC: clang, CXX: clang++ } && cmake --preset debug
        - name: clang-tidy the diff
          shell: bash
          run: |
            base="${{ github.event.pull_request.base.sha }}"
            git diff --name-only --diff-filter=AM "$base"...HEAD -- '*.cpp' '*.hpp' '*.h' > changed.txt || true
            [[ -s changed.txt ]] || exit 0
            mapfile -t f < changed.txt
            clang-tidy -p build/debug --warnings-as-errors='*' "${f[@]}"
    valgrind:
      name: valgrind / leak-check=full
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - run: sudo apt-get update && sudo apt-get install -y valgrind
        - name: Run the demonstrative test under Valgrind
          run: |
            valgrind --leak-check=full --show-leak-kinds=all \
              --errors-for-leak-kinds=definite,indirect --error-exitcode=1 \
              ./build/debug/<demonstrative-test>

supports:
  threading_sanitizer: true
  bench: true
  abi_stability: true
notes: >
  C/C++ is the reference language. The library scope stays zero-dependency; deps (doctest)
  are gated under the test/bench CMake options. Sanitizer presets (asan/ubsan) are
  POSIX-only — omit them for the Windows matrix cells. Add a TSan job only when the project
  exposes threading. For a C-ABI core under C++17, add an ANSI-C/C99 pedantic compat job.
