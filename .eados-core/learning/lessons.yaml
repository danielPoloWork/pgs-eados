# Lessons ledger — the factory's durable, generalizable memory.
# Read at the start of a run; append (drafted, human-approved) after corrections.
# Schema per entry (validated by tools/eados_lint.py): id, date, scope, context, rule, [source].
# scope is one of: global | lang:<lang> | kind:<library|service|cli|app>.

- id: L-0001
  date: 2026-06-16
  scope: global
  context: A multi-line block (CI setup steps) injected into a template landed at column 0, producing invalid YAML.
  rule: A placeholder that injects a multi-line block must carry the target indentation, and the renderer must indent continuation lines to that column.
  source: feat(tools) deterministic renderer

- id: L-0002
  date: 2026-06-16
  scope: global
  context: A capability flag (i18n) gated a lint check whose required file had no template, so enabling it failed the generated lint on day zero.
  rule: Every capability flag that a check depends on must ship the artifact that check reads; verify by rendering a variant with the flag on.
  source: feat i18n subsystem

- id: L-0003
  date: 2026-07-01
  scope: global
  context: The hand-rolled YAML loader silently truncated constructs outside its subset (unclosed flow collections and quoted scalars at end-of-line) in the questionnaire, so a maintainer's input could vanish with no error.
  rule: A hand-rolled parser must loudly reject any construct it cannot represent instead of silently truncating it, and prove its supported subset with a differential against a reference parser.
  source: audit #153; fix #166 (yamlmini loud rejection; ADR-0006/0008)

- id: L-0004
  date: 2026-06-28
  scope: global
  context: A re-audit flagged profile CI actions shipping version-tag pins (vs the factory's SHA pins) as an inconsistency, but ADR-0009 §3 had already decided it — profile actions stay tag-pinned and Dependabot-managed by design.
  rule: Before filing an apparent inconsistency as a gap, check whether the governing ADR already decided it; a re-discovered trade-off is an addendum, not a new issue.
  source: audit #132; ADR-0009 §3 addendum (PR #137)

- id: L-0005
  date: 2026-07-11
  scope: global
  context: A milestone plan reserved "ADR-0019" for a not-yet-written decision; another milestone's work landed first and consumed that number, so the reservation was stale by the time the plan's own decision was ready to write up.
  rule: Never hardcode a future ADR number in a plan doc — numbering is sequential and never reused, so a reservation made ahead of authoring can be consumed by unrelated work that lands first; resolve the actual number at authoring time and correct the plan in the same PR.
  source: M17 17.1 (#277); ADR-0022 (numbering corrected from the reserved "ADR-0019")
