# c.yaml — C toolchain profile. Mirrors cpp.yaml's rigor; C has no namespaces (symbol prefix)
# and stays dependency-free at library scope.

lang:             c
display_name:     "C"
default_standard: "C11 (ISO/IEC 9899:2011)"
src_ext:          c

namespace_pattern: "{project_slug}_ symbol prefix (C has no namespaces; e.g. it_d4np_memorypool_)"
import_idiom:      "#include <{group_path}/{project_slug}/{project_slug}.h>"

toolchain:
  build_tool:      "CMake (>=3.20) + Ninja, CMakePresets.json"
  pkg_manager:     "vcpkg / Conan (test deps only; library stays dependency-free)"
  test_framework:  "Unity or Criterion (test scope only)"
  formatter:       "clang-format (LLVM-derived, 4-space, 120 col)"
  linter:          "clang-tidy + cppcheck"
  sanitizers:      "ASan, UBSan, TSan, Valgrind"
  coverage_tool:   "llvm-cov / gcovr"
  doc_tool:        "Doxygen"
  version_file:    "version.h"
  version_const_hint: "<SLUG>_VERSION_{MAJOR,MINOR,PATCH,STRING}"
  package_ecosystem: ""                    # no Dependabot ecosystem for vcpkg/Conan

commands:
  build:        "cmake --build --preset debug"
  test:         "ctest --preset debug --output-on-failure"
  format_check: "clang-format --dry-run --Werror <files>"
  lint:         "clang-tidy --warnings-as-errors='*' <changed .c/.h>"
  bench:        "cmake --build --preset bench"

config_files:
  - .clang-format
  - .clang-tidy
  - CMakeLists.txt
  - CMakePresets.json

ci:
  tier1_platforms: "Linux x86_64 (GCC>=11, Clang>=14), Windows x86_64 (MSVC>=19.30), macOS arm64 (Apple Clang>=14)"
  matrix:
    - { os: ubuntu-24.04, toolchain: gcc,         preset: debug }
    - { os: ubuntu-24.04, toolchain: gcc,         preset: release }
    - { os: ubuntu-24.04, toolchain: clang,       preset: asan }
    - { os: ubuntu-24.04, toolchain: clang,       preset: ubsan }
    - { os: windows-2022, toolchain: msvc,        preset: debug }
    - { os: macos-14,     toolchain: apple-clang, preset: debug }
  setup_steps: |
    - name: Install a recent CMake and Ninja
      uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
    - name: Set up MSVC environment
      if: matrix.toolchain == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1
      with: { arch: x64 }
  extra_jobs: |
    format:
      name: format / clang-format check
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - name: Verify all C sources are clean
          shell: bash
          run: |
            mapfile -t files < <(git ls-files '*.c' '*.h')
            [[ ${#files[@]} -eq 0 ]] && exit 0
            clang-format --dry-run --Werror "${files[@]}"
    cppcheck:
      name: cppcheck / static analysis
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - run: sudo apt-get update && sudo apt-get install -y cppcheck
        - run: cppcheck --enable=warning,portability --error-exitcode=1 src/
    valgrind:
      name: valgrind / leak-check=full
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v6
        - run: sudo apt-get update && sudo apt-get install -y valgrind
        - name: Run the demonstrative test under Valgrind
          run: |
            valgrind --leak-check=full --error-exitcode=1 ./build/debug/<demonstrative-test>
  race_job: |
    tsan:
      name: tsan / thread sanitizer
      runs-on: ubuntu-24.04
      env: { CC: clang }
      steps:
        - uses: actions/checkout@v6
        - uses: lukka/get-cmake@e0566b3900d662ef5b1dc36fb560c4d2b1b6d6bd # v4.3.3
        - name: Build + test under ThreadSanitizer
          run: cmake --preset tsan && cmake --build --preset tsan && ctest --preset tsan --output-on-failure

supports:
  threading_sanitizer: true
  bench: true
  abi_stability: true
notes: |
  C11 by default; offer an ANSI-C/C99 pedantic compat job for libraries with broad reach. The
  library scope stays dependency-free; test deps (Unity/Criterion) are gated under CMake options.
  Sanitizer presets (asan/ubsan/tsan) are POSIX-only — omit them on the Windows matrix cell.
