# EADOS Git / PR / CI / release policy — reference instance.
# Encodes AGENTS.md §6 as data so the workflow gates enforce it. Schema: ./_schema.md.
# Design: ../../../docs/rfc/0001-eados-delivery-os.md.
version: 1

branch_naming:
  pattern: "<type>/<short-kebab>"
  types: [feat, fix, refactor, perf, docs, test, build, chore, ci]

commit:
  convention: conventional-commits
  scopes: [interview, profiles, templates, lint, agent, docs, adr, ci, os, workflow, authority, git, rfc, plan, risk, contribution, commands, traceability, tools, setup, release]
  one_logical_change_per_pr: true
  one_pr_at_a_time: true

pr:
  draft_by: implementing-role     # the agent role that owns the phase drafts the PR
  opened_by: human                # the owner opens / marks ready
  merged_by: human                # the owner squash-merges — never the agent
  merge_method: squash            # the repository allows squash only
  one_type_label: true
  required_crosslinks: [rfc, milestone]   # PR *body* references (traceability edges) — distinct from `metadata` below
  template: ".github/PULL_REQUEST_TEMPLATE.md"
  review_gate: contribution-review   # M8: /eados review drafts a recommendation on an inbound PR; the human disposes
  # GitHub project-board fields SET ON CREATION via `gh pr create` (#141) — distinct from the body
  # cross-links above (those are referenced *in* the body for traceability; these are gh metadata
  # flags). `assignee` resolves to the OWNER, never "@me" (which is whichever actor — human or agent —
  # drafts the PR): EADOS's own repo -> the owner (danielPoloWork); a generated repo -> the manifest owner.
  metadata:
    assignee: owner          # the repository owner, NOT "@me"/the gh actor that drafts the PR
    label: one-type          # exactly one type label matching the lead commit's <type> (see one_type_label)
    milestone: current-open  # the current open release / roadmap milestone
    project: if-present      # the GitHub Project, attached when the repo has one

release:
  scheme: semver
  pre_1_0_milestone_driven: true
  tag_flow: "annotated tag on the merge commit, post-merge"
  merge_is_not_deploy: true       # merged -> tagged/released -> deployed are distinct states
  # Carry-through: the agent always takes a release up to a DRAFT — the human only clicks Publish.
  tag_by: agent                   # the agent creates + pushes the annotated tag, post-merge
  draft_release_by: agent         # ...and opens the GitHub Release as a DRAFT (CI drafts it on tag-push in generated repos)
  publish_by: human               # the human reviews the draft and publishes — the deliberate checkpoint
  delegation_flag: false          # owner may flip this to delegate the publish step too (then the agent publishes)

traceability:
  graph: "requirement(spec §) -> rfc -> milestone -> branch/pr -> commit -> release tag -> audit"
  gate: traceability-lint         # built in M3/M4; derives the graph from the cross-links above
